services:
  - type: web
    name: fx281-studio
    runtime: python
    buildCommand: npm install && npm run build && pip install -r backend/requirements-cloud.txt
    startCommand: cd backend && python main.py
    envVars:
      - key: ASR_MODE
        value: dashscope
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
